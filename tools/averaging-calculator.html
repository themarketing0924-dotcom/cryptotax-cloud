{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"물타기 평균단가는 어떻게 계산하나요?","acceptedAnswer":{"@type":"Answer","text":"평균단가 = 총 매수금액 합계 ÷ 총 보유수량 합계입니다. 예: 5천만원에 0.01 BTC + 3천만원에 0.02 BTC = 총 8천만원 ÷ 0.03 BTC = 평균단가 26,667만원/BTC."}},{"@type":"Question","name":"물타기와 DCA(정기매수)의 차이는?","acceptedAnswer":{"@type":"Answer","text":"물타기는 하락 시 추가 매수하는 방식이고, DCA는 정해진 날짜에 정해진 금액을 꾸준히 매수하는 계획적 전략입니다. 장기 수익률 면에서 DCA가 더 안정적입니다."}},{"@type":"Question","name":"물타기 후 매도 시 세금은 어떻게 계산하나요?","acceptedAnswer":{"@type":"Answer","text":"이동평균법으로 계산된 평균단가가 취득원가입니다. 세금 = (매도금액 - 평균 취득원가) × 22%. 여러 번 물타기한 경우 CSV 세금 계산기를 이용하면 자동 계산됩니다."}},{"@type":"Question","name":"손익분기점은 어떻게 계산하나요?","acceptedAnswer":{"@type":"Answer","text":"손익분기점 = 평균 취득원가 × (1 + 수수료율). 수수료 0.05% 기준: 평균단가 5,000만원 × 1.001 = 손익분기점 약 5,005만원."}},{"@type":"Question","name":"물타기는 몇 번까지 하는 게 좋은가요?","acceptedAnswer":{"@type":"Answer","text":"분할 물타기 방식을 권장합니다. 총 추가 매수 자금을 3~4회로 나눠 10%·20%·30% 하락 시 단계적으로 투입하는 방식이 리스크 관리에 효과적입니다. 한 번에 전액 투입하면 추가 하락 시 대응 자금이 없어집니다."}}]}
