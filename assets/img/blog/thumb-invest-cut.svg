<svg xmlns="http://www.w3.org/2000/svg" width="480" height="270" viewBox="0 0 480 270">
<defs></defs>
<rect width="480" height="270" fill="#0d0808"/>
<rect x="0" y="0" width="480" height="3" fill="#f85149"/>
<text x="28" y="52" font-family="Arial,sans-serif" font-size="16" font-weight="900" fill="#f85149">✂️ 코인 손절 타이밍</text>
<text x="28" y="70" font-family="Arial,sans-serif" font-size="11" fill="#888">감정 없이 원칙으로 손절하는 법</text>
<!-- 차트 - 하락 -->
<polyline points="48,90 100,100 152,95 200,120 240,140 280,170 310,200" stroke="#f85149" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<polygon points="48,200 100,200 152,200 200,200 240,200 280,200 310,210 310,210 280,210 240,210 200,210 152,210 100,210 48,210" fill="#f85149" opacity=".05"/>
<!-- 손절선 -->
<line x1="28" y1="170" x2="320" y2="170" stroke="#f85149" stroke-width="1" stroke-dasharray="6,4"/>
<text x="325" y="174" font-family="Arial,sans-serif" font-size="10" fill="#f85149">손절선 -20%</text>
<!-- 손절 포인트 -->
<circle cx="280" cy="170" r="8" fill="#f85149"/>
<text x="275" y="148" font-family="Arial,sans-serif" font-size="10" fill="#f85149" text-anchor="middle">손절!</text>
<!-- 원칙 카드들 -->
<rect x="330" y="80" width="130" height="170" rx="12" fill="#111"/>
<text x="395" y="105" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#888" text-anchor="middle">손절 3원칙</text>
<text x="355" y="130" font-family="Arial,sans-serif" font-size="11" fill="#f0f0f0">① -20% 자동매도</text>
<text x="355" y="155" font-family="Arial,sans-serif" font-size="11" fill="#f0f0f0">② 이유 없으면 손절</text>
<text x="355" y="180" font-family="Arial,sans-serif" font-size="11" fill="#f0f0f0">③ 버티기 금지</text>
<line x1="350" y1="195" x2="440" y2="195" stroke="#222" stroke-width="1"/>
<text x="395" y="212" font-family="Arial,sans-serif" font-size="10" fill="#f85149" text-anchor="middle">손실 고정 = 기회 확보</text>
<text x="395" y="235" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">손실 활용 → 절세 가능</text>
</svg>