<text x="83" y="154" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">연 APR</text>
<rect x="150" y="88" width="110" height="80" rx="10" fill="#0f1424" stroke="#3fb950" stroke-width="1.5"/>
