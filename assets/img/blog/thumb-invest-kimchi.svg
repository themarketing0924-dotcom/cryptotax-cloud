<svg xmlns="http://www.w3.org/2000/svg" width="480" height="270" viewBox="0 0 480 270">
<defs></defs>
<rect width="480" height="270" fill="#0a0a0d"/>
<rect x="0" y="0" width="480" height="3" fill="#ef4444"/>
<!-- 국기 배경 -->
<circle cx="380" cy="135" r="100" fill="#ef4444" opacity=".06"/>
<!-- 제목 -->
<text x="28" y="52" font-family="Arial,sans-serif" font-size="20" font-weight="900" fill="#f0f0f0">🌶️ 김치프리미엄</text>
<text x="28" y="72" font-family="Arial,sans-serif" font-size="11" fill="#888">한국 vs 해외 거래소 가격 차이</text>
<!-- 게이지 -->
<rect x="28" y="95" width="280" height="12" rx="6" fill="#222"/>
<rect x="28" y="95" width="196" height="12" rx="6" fill="#ef4444"/>
<text x="234" y="107" font-family="Arial,sans-serif" font-size="10" fill="#ef4444">70%</text>
<text x="28" y="88" font-family="Arial,sans-serif" font-size="9" fill="#888">김프 강도</text>
<!-- 수치들 -->
<rect x="28" y="120" width="130" height="70" rx="10" fill="#111"/>
<text x="93" y="145" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">업비트 BTC</text>
<text x="93" y="168" font-family="Arial,sans-serif" font-size="15" font-weight="900" fill="#ef4444" text-anchor="middle">₩75,514만</text>
<rect x="170" y="120" width="130" height="70" rx="10" fill="#111"/>
<text x="235" y="145" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">바이낸스 BTC</text>
<text x="235" y="168" font-family="Arial,sans-serif" font-size="15" font-weight="900" fill="#3fb950" text-anchor="middle">$51,800</text>
<!-- 프리미엄 수치 -->
<rect x="330" y="95" width="120" height="95" rx="12" fill="#ef4444" opacity=".12" stroke="#ef4444" stroke-width="1"/>
<text x="390" y="125" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">현재 김프</text>
<text x="390" y="157" font-family="Arial,sans-serif" font-size="32" font-weight="900" fill="#ef4444" text-anchor="middle">+3.2%</text>
<!-- 하단 -->
<text x="28" y="218" font-family="Arial,sans-serif" font-size="10" fill="#555">김프가 높을 때: 국내 매도 전략 / 김프가 낮을 때: 역프리미엄 매수 기회</text>
</svg>