<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무료 세금 상담 | CryptoTax.cloud</title>
<meta name="description" content="2027 가상자산 양도소득세 무료 상담. 업비트·빗썸 투자자를 위한 코인 세금 전문 상담 서비스.">
<link rel="stylesheet" href="/style.css">
<style>
.consult-hero{padding:52px 20px 40px;text-align:center;background:var(--hero-bg);}
.consult-hero h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900;margin-bottom:12px;letter-spacing:-0.03em;}
.consult-hero p{color:var(--text-secondary);font-size:1rem;max-width:560px;margin:0 auto 28px;}
.consult-form-wrap{max-width:640px;margin:0 auto;padding:0 20px 60px;}
.consult-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:16px;padding:32px 28px;}
.consult-card h2{font-size:1.2rem;font-weight:800;margin-bottom:20px;color:var(--text-primary);}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:0.84rem;font-weight:700;color:var(--text-secondary);margin-bottom:6px;}
.form-input{width:100%;background:var(--bg-base);border:1px solid var(--border-default);border-radius:9px;padding:12px 15px;color:var(--text-primary);font-size:1rem;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--orange);}
select.form-input{background:var(--bg-base);color:var(--text-primary);}
textarea.form-input{min-height:120px;resize:vertical;}
.submit-btn{width:100%;background:linear-gradient(135deg,#FF8C00,#e8820a);color:#fff;border:none;border-radius:10px;padding:16px;font-size:1.05rem;font-weight:800;cursor:pointer;margin-top:8px;transition:opacity 0.2s;}
.submit-btn:hover{opacity:0.9;}
.benefits{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:760px;margin:0 auto 40px;padding:0 20px;}
@media(max-width:600px){.benefits{grid-template-columns:1fr;}}
.benefit-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:14px;padding:20px;text-align:center;}
.benefit-card .b-icon{font-size:2rem;margin-bottom:10px;}
.benefit-card h3{font-size:0.95rem;font-weight:800;margin-bottom:6px;color:var(--text-primary);}
.benefit-card p{font-size:0.8rem;color:var(--text-secondary);}
.success-msg{display:none;background:var(--green-dim);border:1px solid var(--green-border);border-radius:10px;padding:20px;text-align:center;color:var(--green);font-weight:700;margin-top:16px;}
</style>
<link rel="stylesheet" href="/assets/css/common.css">
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="/">₿ CryptoTax<span>.cloud</span></a>
    <div class="nav-right">
      <div class="nav-links">
        <a href="/">홈</a>
        <a href="/tools/">계산기</a>
        <a href="/blog/">블로그</a>
        <a href="/consultation.html" class="nav-cta">무료 상담</a>
      </div>
    </div>
  </div>
</nav>

<!-- 히어로 -->
<section class="consult-hero">
  <h1>💬 무료 코인 세금 상담</h1>
  <p>2027 가상자산 양도소득세 · 절세 전략 · 손익 통산<br>전문가가 직접 답변해 드립니다</p>

  <!-- 혜택 3개 -->
  <div class="benefits">
    <div class="benefit-card">
      <div class="b-icon">🆓</div>
      <h3>완전 무료</h3>
      <p>상담료 0원<br>부담 없이 문의하세요</p>
    </div>
    <div class="benefit-card">
      <div class="b-icon">⚡</div>
      <h3>24시간 내 답변</h3>
      <p>이메일로 빠르게<br>답변 드립니다</p>
    </div>
    <div class="benefit-card">
      <div class="b-icon">🔒</div>
      <h3>개인정보 보호</h3>
      <p>상담 목적 외<br>절대 사용 안 함</p>
    </div>
  </div>
</section>

<!-- 상담 폼 -->
<div class="consult-form-wrap">
  <div class="consult-card">
    <h2>📋 상담 신청서</h2>

    <div class="form-group">
      <label class="form-label">이름 *</label>
      <input class="form-input" type="text" id="c-name" placeholder="예: 홍길동">
    </div>

    <div class="form-group">
      <label class="form-label">이메일 *</label>
      <input class="form-input" type="email" id="c-email" placeholder="예: abc@gmail.com">
    </div>

    <div class="form-group">
      <label class="form-label">전화번호</label>
      <input class="form-input" type="tel" id="c-phone" placeholder="예: 010-1234-5678">
    </div>

    <div class="form-group">
      <label class="form-label">주요 거래소 *</label>
      <select class="form-input" id="c-exchange">
        <option value="">선택해주세요</option>
        <option>업비트</option>
        <option>빗썸</option>
        <option>바이낸스</option>
        <option>업비트 + 빗썸</option>
        <option>기타 (복수 거래소)</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">상담 유형 *</label>
      <select class="form-input" id="c-type">
        <option value="">선택해주세요</option>
        <option>2027 세금 계산</option>
        <option>절세 전략</option>
        <option>손익 통산</option>
        <option>CSV 세금 신고</option>
        <option>기타</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">상담 내용 *</label>
      <textarea class="form-input" id="c-content" placeholder="궁금한 점을 자유롭게 적어주세요."></textarea>
    </div>

    <button class="submit-btn" onclick="submitConsult()">💬 무료 상담 신청하기</button>
    <div class="success-msg" id="c-success">✅ 신청이 완료되었습니다! 24시간 내 이메일로 답변 드릴게요.</div>
  </div>
</div>

<!-- 푸터 -->
<footer class="footer">
  <div class="footer-bottom" style="max-width:920px;margin:0 auto;text-align:center;color:var(--text-muted);font-size:0.79rem;">
    © 2026 CryptoTax.cloud — 
    <a href="/disclaimer.html">면책조항</a> · 
    <a href="/privacy-policy.html">개인정보처리방침</a>
  </div>
</footer>

<script>
function submitConsult(){
  const name = document.getElementById('c-name').value.trim();
  const email = document.getElementById('c-email').value.trim();
  const exchange = document.getElementById('c-exchange').value;
  const type = document.getElementById('c-type').value;
  const content = document.getElementById('c-content').value.trim();

  if(!name || !email || !exchange || !type || !content){
    alert('필수 항목을 모두 입력해주세요.');
    return;
  }

  // 여기에 실제 폼 전송 연동 (Formspree 등)
  document.getElementById('c-success').style.display = 'block';
  setTimeout(()=>{
    document.getElementById('c-success').style.display = 'none';
  }, 5000);
}
</script>
<script src="/assets/js/common.js"></script>
<script src="/assets/js/ctc-ticker.js"></script>
</body>
</html>
